version: "2"
run:
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - decorder
    - dogsled
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - forbidigo
    - forcetypeassert
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - godot
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - grouper
    - importas
    - loggercheck
    - mirror
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - paralleltest
    - predeclared
    - promlinter
    - reassign
    - sqlclosecheck
    - tagalign
    - testableexamples
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - zerologlint
  disable:
    - containedctx
    - cyclop
    - dupl
    - dupword
    - err113
    - exhaustive
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - gocyclo
    - godox
    - interfacebloat
    - ireturn
    - lll
    - maintidx
    - makezero
    - musttag
    - nestif
    - nlreturn
    - nonamedreturns
    - prealloc
    - revive
    - rowserrcheck
    - tagliatelle
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    depguard:
      rules:
        disallow-banned-packages:
          deny:
            - pkg: github.com/stretchr/testify/mock
              desc: >-
                Use matryer/moq for mocks. See any existing <pkg>/mock/doc.go
                for the go:generate pattern (e.g. authentication/tokens/mock).
                testify/mock is banned; do not reintroduce it.
            - pkg: github.com/stretchr/testify/assert
              desc: >-
                Use github.com/shoenig/test (package name `test`) for
                non-fatal assertions. See existing tests (e.g.
                database/errors_test.go) for examples. testify/assert is
                banned; do not reintroduce it.
            - pkg: github.com/stretchr/testify/require
              desc: >-
                Use github.com/shoenig/test/must (package name `must`) for
                fatal assertions. testify/require is banned; do not
                reintroduce it.
            - pkg: github.com/pkg/errors
              desc: >-
                Use github.com/cockroachdb/errors for rich error context.
                Platform-level sentinels live in internalerrors/.
            - pkg: io/ioutil
              desc: >-
                Deprecated since Go 1.16. Use io and os (e.g. io.ReadAll,
                os.ReadFile, os.WriteFile) instead.
            - pkg: math/rand
              desc: >-
                Use math/rand/v2. The v1 package has a globally-shared
                Source and is race-prone; this repo standardized on v2.
            - pkg: github.com/dgrijalva/jwt-go
              desc: >-
                Abandoned upstream with known CVEs. Use
                github.com/golang-jwt/jwt/v5 (already a direct dep).
    errcheck:
      check-type-assertions: true
      check-blank: true
    forbidigo:
      forbid:
        - pattern: ^t\.SkipNow\(\)$
      exclude-godoc-examples: false
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - captLocal
        - singleCaseSwitch
        - sloppyReassign
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      settings:
        rangeValCopy:
          sizeThreshold: 32
    govet:
      enable-all: true
      settings:
        shadow:
          strict: true
    misspell:
      locale: US
      ignore-rules:
        - cancelled
        - cancelling
    nakedret:
      max-func-lines: 4
    unparam:
      check-exported: false
    unused:
      field-writes-are-uses: false
      post-statements-are-reads: true
      exported-fields-are-used: false
      parameters-are-used: true
      local-variables-are-used: true
      generated-is-used: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - bodyclose
          - errcheck
          - forcetypeassert
          - goconst
          - gosec
          - nilnil
          - unparam
          - unused
          - contextcheck
        path: (.+)_test\.go
      - linters:
          - errcheck
          - forcetypeassert
          - mnd
        path: mock_?.*\.go
      - linters:
          - forcetypeassert
        path: encoding/mock
      - linters:
          - forcetypeassert
        path: messagequeue/mock
      - linters:
          - forcetypeassert
        path: routing/mock
      - linters:
          - forcetypeassert
        path: uploads/mock
      - linters:
          - forcetypeassert
        path: uploads/images/mock.go
      - linters:
          - gocritic
        text: 'captLocal: `T'' should not be capitalized'
      - linters:
          - gosec
        text: 'G304:'
      - linters:
          - gosec
        text: 'G118:'
      - linters:
          - gosec
        text: 'G115:'
      - linters:
          - gosec
        text: 'G117:'
      # //go:fix is valid in Go 1.23+; gocheckcompilerdirectives does not recognize it yet
      - linters:
          - gocheckcompilerdirectives
        text: '//go:fix'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - prefix(github.com/primandproper/platform-go/v3)
        - prefix(github.com/primandproper)
        - default
      custom-order: true
    gofmt:
      simplify: true
